<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ForexTradingBot</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Toastr CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
    <!-- Chart.js - No separate CSS usually needed, but ensure it's loaded before script -->
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chart-canvas {
            max-height: 350px; /* Or any desired height */
            width: 100% !important; /* Ensure Chart.js respects container width */
        }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <i class="fas fa-spinner fa-spin"></i>
        <span>Loading Dashboard...</span>
    </div>

    <header>
      <div class="container"> <!-- Added container for better alignment -->
        <h1><i class="fas fa-shield-alt"></i> ForexTradingBot Admin Panel</h1>
        <nav>
            <ul>
                <li><a href="/index.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="/config.html" id="goToConfigLink"><i class="fas fa-plug"></i> Connection Test</a></li>
                <li><a href="/settings.html"><i class="fas fa-sliders-h"></i> App Settings</a></li>
                <li><a href="/status.html"><i class="fas fa-heartbeat"></i> System Status</a></li>
                <li><a href="/logs.html"><i class="fas fa-file-alt"></i> View Logs</a></li>
                <li><a href="/info.html"><i class="fas fa-info-circle"></i> Info & Help</a></li>
                <li><button id="logoutButton" class="btn btn-link"><i class="fas fa-sign-out-alt"></i> Logout</button></li>
            </ul>
        </nav>
      </div>
    </header>

    <div class="container mt-3 mb-3"> <!-- Added mt-3 mb-3 for spacing -->
        <h2 class="mb-3"><i class="fas fa-chart-line"></i> At a Glance</h2>
        <div class="dashboard-grid">
            <div class="card">
                <h3><i class="fas fa-users"></i> Total Users</h3>
                <p id="totalUsers">--</p>
            </div>
            <div class="card">
                <h3><i class="fas fa-rss"></i> Signals Today</h3>
                <p id="signalsToday">--</p>
            </div>
            <!-- Example for a deferred metric or future addition
            <div class="card">
                <h3><i class="fas fa-envelope"></i> Messages Today</h3>
                <p id="messagesToday">--</p>
            </div>
            -->
        </div>

        <div class="dashboard-grid" style="grid-template-columns: 1fr 1fr; margin-top: 30px;">
            <div class="chart-container">
                <h3><i class="fas fa-user-plus"></i> User Growth (Last 7 Days)</h3>
                <canvas id="userGrowthChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-container">
                <h3><i class="fas fa-broadcast-tower"></i> Signals Per Day (Last 7 Days)</h3>
                <canvas id="signalsPerDayChart" class="chart-canvas"></canvas>
            </div>
        </div>

        <!-- Optional: System Status Indicators can go here -->
        <!--
        <div style="margin-top: 30px;">
            <h4>System Status</h4>
            <span class="badge bg-success">Database: OK</span>
            <span class="badge bg-success">Telegram API: OK</span>
        </div>
        -->

    </div>

    <footer>
        <p>&copy; ForexTradingBot Admin Panel</p>
        <button id="themeToggleButton" class="btn btn-sm btn-outline-secondary mt-2"><i class="fas fa-moon"></i> Dark Mode</button>
    </footer>

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- Toastr JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <!-- Custom JS -->
    <script src="js/dashboard.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
