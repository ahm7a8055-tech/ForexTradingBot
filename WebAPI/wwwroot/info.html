<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info & Help Center - ForexTradingBot Admin</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/img/favicon.png"> <!-- Adjust path if you have one -->
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Toastr CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">

    <!-- Custom CSS for the full UI overhaul -->
    <style>
        /*
        ================================================================================
        TABLE OF CONTENTS
        ================================================================================
        1.  :root & Theme Variables (Copied from Dashboard)
        2.  Base & Layout Styles (Copied from Dashboard)
        3.  Help Center Page Specific Styles
            - Content Grid Layout
            - Resource & Action Links
            - Interactive FAQ Accordion
            - Release Notes (Changelog) Styling
            - README Content Styling
        4.  Skeleton Loader System
        5.  Responsive Design
        ================================================================================
        */

        /* 1. :root & Theme Variables */
        :root {
            --font-family-sans: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --sidebar-width: 250px;
            --sidebar-width-collapsed: 90px;
            --header-height: 80px;
            --card-border-radius: 16px;
        }

        [data-theme="light"] {
            --bg-main: #f8f9fa;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-header: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-tertiary: #adb5bd;
            --border-color: #dee2e6;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --primary-color: #6366f1;
            --primary-color-hover: #4f46e5;
            --primary-color-light: rgba(99, 102, 241, 0.1);
            --success-color: #198754;
            --info-color: #0dcaf0;
            --danger-color: #dc3545;
        }

        [data-theme="dark"] {
            --bg-main: #111827;
            --bg-sidebar: #1f2937;
            --bg-card: #1f2937;
            --bg-header: #111827;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --border-color: #374151;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --success-color: #34d399;
            --info-color: #22d3ee;
            --danger-color: #f87171;
        }

        /* 2. Base & Layout Styles */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-family-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
        }

        main {
            padding: 32px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 32px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--card-border-radius);
            box-shadow: 0 4px 25px var(--shadow-color);
            padding: 24px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .card-title .fa-solid, .card-title .fa-brands {
                color: var(--primary-color);
            }
        /* Copied Layout CSS (Sidebar, Header) */
        #app-layout {
            display: flex;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease-in-out;
            z-index: 1000;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            transition: margin-left 0.3s ease-in-out, width 0.3s ease-in-out;
        }

        body.sidebar-collapsed .sidebar {
            width: var(--sidebar-width-collapsed);
        }

        body.sidebar-collapsed .main-content {
            margin-left: var(--sidebar-width-collapsed);
            width: calc(100% - var(--sidebar-width-collapsed));
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            height: var(--header-height);
            padding: 0 28px;
            flex-shrink: 0;
        }

            .sidebar-header .logo-text {
                font-size: 1.5rem;
                font-weight: 700;
                white-space: nowrap;
                opacity: 1;
                transition: opacity 0.2s ease;
            }

        body.sidebar-collapsed .sidebar-header .logo-text {
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 16px;
        }

        .sidebar-nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-nav-item a {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 8px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

            .sidebar-nav-item a .nav-icon {
                font-size: 1.1rem;
                width: 24px;
                margin-right: 20px;
                text-align: center;
                flex-shrink: 0;
            }

            .sidebar-nav-item a .nav-text {
                opacity: 1;
                transition: opacity 0.2s ease;
            }

        body.sidebar-collapsed .sidebar-nav-item a {
            justify-content: center;
        }

            body.sidebar-collapsed .sidebar-nav-item a .nav-text {
                opacity: 0;
                position: absolute;
                pointer-events: none;
            }

        .sidebar-nav-item a.active {
            color: var(--primary-color);
            background-color: var(--primary-color-light);
        }

        .sidebar-nav-item a:hover:not(.active) {
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding: 24px;
            flex-shrink: 0;
        }

        #sidebar-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 100%;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

            #sidebar-toggle:hover {
                border-color: var(--primary-color);
                color: var(--primary-color);
            }

        .main-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 32px;
            position: sticky;
            top: 0;
            background-color: var(--bg-header);
            z-index: 900;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .profile-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

            .profile-btn img {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                object-fit: cover;
            }

        /* 3. Help Center Page Specific Styles */
        .help-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
            align-items: flex-start;
        }

        .main-column {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .side-column {
            display: flex;
            flex-direction: column;
            gap: 32px;
            position: sticky;
            top: calc(var(--header-height) + 32px);
        }

        .resource-list, .action-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

            .resource-list li, .action-list li {
                margin-bottom: 12px;
            }

                .resource-list li:last-child, .action-list li:last-child {
                    margin-bottom: 0;
                }

            .resource-list a, .action-list a {
                display: flex;
                align-items: center;
                gap: 12px;
                text-decoration: none;
                color: var(--text-secondary);
                font-weight: 500;
                padding: 12px;
                border-radius: 8px;
                transition: all 0.2s ease;
            }

                .resource-list a:hover, .action-list a:hover {
                    background-color: var(--bg-main);
                    color: var(--text-primary);
                }

                .resource-list a .fa-solid, .resource-list a .fa-brands {
                    color: var(--text-tertiary);
                }

        #faqSearchInput {
            width: 100%;
            padding: 10px 16px 10px 40px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-main);
            margin-bottom: 16px;
        }

        .faq-search-wrapper {
            position: relative;
        }

            .faq-search-wrapper .fa-search {
                position: absolute;
                left: 16px;
                top: 14px;
                color: var(--text-tertiary);
            }

        .faq-accordion .faq-item {
            border-bottom: 1px solid var(--border-color);
        }

            .faq-accordion .faq-item:last-child {
                border-bottom: none;
            }

        .faq-question {
            padding: 16px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--text-primary);
        }

            .faq-question .fa-chevron-down {
                transition: transform 0.3s ease;
            }

        .faq-item.open .faq-question .fa-chevron-down {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            color: var(--text-secondary);
            padding-bottom: 0;
        }

        .faq-item.open .faq-answer {
            max-height: 300px;
            padding-bottom: 16px;
        }

        .release-notes-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .release-note-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

            .release-note-item:last-child {
                border-bottom: none;
            }

        .release-note-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .release-version {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .release-date {
            font-size: 0.9rem;
            color: var(--text-tertiary);
        }

        .release-note-item ul {
            padding-left: 20px;
            margin: 0;
            color: var(--text-secondary);
        }

        .release-tag {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            margin-left: 8px;
            display: inline-block;
        }

        .tag-new {
            background-color: var(--primary-color-light);
            color: var(--primary-color);
        }

        .tag-fix {
            background-color: rgba(220, 53, 69, 0.1);
            color: var(--danger-color);
        }

        .tag-perf {
            background-color: rgba(25, 135, 84, 0.1);
            color: var(--success-color);
        }

        .readme-content {
            line-height: 1.7;
        }

            .readme-content h3 {
                font-size: 1.5rem;
                margin-top: 24px;
                margin-bottom: 12px;
                padding-bottom: 8px;
                border-bottom: 1px solid var(--border-color);
            }

            .readme-content p, .readme-content ul {
                color: var(--text-secondary);
            }

            .readme-content code {
                background-color: var(--bg-main);
                padding: 2px 6px;
                border-radius: 4px;
                font-family: monospace;
            }

            .readme-content a {
                color: var(--primary-color);
                text-decoration: underline;
            }

        /* 4. Skeleton Loader System */
        .skeleton {
            animation: skeleton-loading 1.5s infinite linear;
            background-color: #e9ecef;
            background-image: linear-gradient(90deg, #e9ecef, #f8f9fa, #e9ecef);
        }

        [data-theme="dark"] .skeleton {
            background-color: #374151;
            background-image: linear-gradient(90deg, #374151, #4b5563, #374151);
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .is-loading .content-loaded {
            visibility: hidden;
        }

        .skeleton-wrapper {
            display: none;
        }

        .is-loading .skeleton-wrapper {
            display: block;
        }

        /* 5. Responsive Design */
        @media (max-width: 992px) {
            .help-grid {
                grid-template-columns: 1fr;
            }

            .side-column {
                position: static;
            }

            body:not(.sidebar-mobile-open) .sidebar {
                transform: translateX(-100%);
            }

            .sidebar {
                position: fixed;
            }

            body.sidebar-mobile-open .sidebar {
                transform: translateX(0);
                box-shadow: 0 0 40px rgba(0,0,0,0.1);
            }

            .main-content, body.sidebar-collapsed .main-content {
                margin-left: 0;
                width: 100%;
            }

            #mobile-menu-toggle {
                display: block !important;
            }

            .sidebar-footer {
                display: none;
            }
        }

        @media (max-width: 768px) {
            main {
                padding: 16px;
            }

            .page-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

    <div id="app-layout">
        <!-- ======================= Sidebar ======================= -->
        <aside class="sidebar">

    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <!-- Dynamic Controller & UI Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- HELP CENTER CONTROLLER ---
            const helpController = {
                // --- 1. Element Cache ---
                elements: {
                    sidebarToggle: document.getElementById('sidebar-toggle'),
                    mobileMenuToggle: document.getElementById('mobile-menu-toggle'),
                    themeToggleBtn: document.getElementById('theme-toggle-btn'),
                    readmeContainer: document.getElementById('readmeContainer'),
                    releaseNotesContainer: document.getElementById('releaseNotesContainer'),
                    resourcesContainer: document.getElementById('resourcesContainer'),
                    actionsContainer: document.getElementById('actionsContainer'),
                    faqContainer: document.getElementById('faqContainer'),
                    faqSearchInput: document.getElementById('faqSearchInput'),
                },

                // --- 2. State & Mock Data ---
                state: {
                    faqData: [],
                },
                mockData: {
                    readme: `
                            <h3>Project Overview</h3>
                            <p><strong>ForexSignalBot</strong> is an AI-enhanced Telegram system designed to deliver hyper-accurate, real-time trading signals for global financial markets, with a strategic focus on Forex.</p>
                            <p>Built on .NET 9 and adhering to Clean Architecture and Domain-Driven Design, it provides a resilient, intuitive, and performant platform for traders of all levels.</p>
                            <h3>Key Highlights</h3>
                            <ul>
                                <li>🤖 AI-Powered Signal Generation</li>
                                <li>📰 Real-time News Aggregation from 100+ sources</li>
                                <li>💬 Full UI Experience directly within Telegram</li>
                                <li>🔗 Automated Signal Execution (Auto-Forwarder)</li>
                            </ul>
                        `,
                    releaseNotes: [
                        { version: "v2.1.0", date: "May 20, 2024", notes: [{ tag: 'new', text: "Added live System Status page with real-time charts." }, { tag: 'fix', text: "Improved accuracy of signal parsing algorithm." }] },
                        { version: "v2.0.5", date: "May 15, 2024", notes: [{ tag: 'perf', text: "Optimized database queries for faster dashboard loading." }, { tag: 'fix', text: "Resolved issue with Telegram API connection timeouts." }] },
                    ],
                    resources: [
                        { text: 'Main GitHub Repository', icon: 'fa-brands fa-github', url: 'https://github.com/Opselon/ForexTradingBot' },
                        { text: 'Report an Issue', icon: 'fa-solid fa-bug', url: 'https://github.com/Opselon/ForexTradingBot/issues' },
                        { text: 'View Project License', icon: 'fa-solid fa-scroll', url: 'https://github.com/Opselon/ForexTradingBot/blob/main/LICENSE' },
                    ],
                    quickActions: [
                        { text: 'Test Connections', icon: 'fa-solid fa-plug-circle-check', url: '/config.html' },
                        { text: 'Manage Settings', icon: 'fa-solid fa-sliders', url: '/settings.html' },
                        { text: 'View Latest Logs', icon: 'fa-solid fa-file-lines', url: '/logs.html' },
                    ],
                    faq: [
                        { q: "How do I update my Telegram Bot Token?", a: "Navigate to the 'App Settings' page. Find the 'Telegram Bot' section and update the 'BotToken' field. Remember to save your changes." },
                        { q: "Where can I see if my database connection is working?", a: "Go to the 'Connection Test' page to test your connection string. The 'System Status' page also shows the live database connectivity status." },
                        { q: "How are sensitive settings like API keys stored?", a: "When you save settings through the admin panel, sensitive values are encrypted before being stored. Environment variables can override these settings and are loaded directly by the application." },
                        { q: "What does the 'Auto-Forwarder' feature do?", a: "The Auto-Forwarder automatically sends trading signals from this bot to your connected trading platform client (e.g., MetaTrader), eliminating the need for manual order entry." }
                    ]
                },

                // --- 3. Initialization ---
                init() {
                    console.log("Controller: Initializing Help Center...");
                    this.initUI();
                    this.bindEvents();
                    this.loadContent();
                },

                initUI() {
                    const savedTheme = localStorage.getItem('theme') || 'light';
                    this.applyTheme(savedTheme);
                },

                // --- 4. Event Binding ---
                bindEvents() {
                    this.elements.sidebarToggle?.addEventListener('click', () => document.body.classList.toggle('sidebar-collapsed'));
                    this.elements.mobileMenuToggle?.addEventListener('click', () => document.body.classList.toggle('sidebar-mobile-open'));
                    this.elements.themeToggleBtn?.addEventListener('click', () => this.toggleTheme());

                    this.elements.faqContainer.addEventListener('click', (e) => {
                        const question = e.target.closest('.faq-question');
                        if (question) this.toggleFaqItem(question.parentElement);
                    });
                    this.elements.faqSearchInput.addEventListener('input', (e) => this.filterFaq(e.target.value));
                },

                // --- 5. Core Logic / "Controller" Actions ---
                applyTheme(theme) {
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('theme', theme);
                    const icon = this.elements.themeToggleBtn.querySelector('i');
                    icon.className = theme === 'dark' ? 'far fa-moon' : 'far fa-sun';
                },
                toggleTheme() { this.applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); },

                loadContent() {
                    console.log("Controller: Loading all help content...");
                    document.body.classList.add('is-loading');
                    // Simulate fetching all content
                    setTimeout(() => {
                        this.renderReadme();
                        this.renderReleaseNotes();
                        this.renderResources();
                        this.renderQuickActions();
                        this.state.faqData = this.mockData.faq;
                        this.renderFaq();
                        document.body.classList.remove('is-loading');
                        console.log("Controller: Content loaded and rendered.");
                    }, 800);
                },

                renderReadme() {
                    this.elements.readmeContainer.innerHTML = this.mockData.readme;
                },

                renderReleaseNotes() {
                    this.elements.releaseNotesContainer.innerHTML = this.mockData.releaseNotes.map(release => `
                            <div class="release-note-item">
                                <div class="release-note-header">
                                    <h4 class="release-version">${release.version}</h4>
                                    <span class="release-date">${release.date}</span>
                                </div>
                                <ul>
                                    ${release.notes.map(note => `<li><span class="release-tag tag-${note.tag}">${note.tag.toUpperCase()}</span> ${note.text}</li>`).join('')}
                                </ul>
                            </div>
                        `).join('');
                },

                renderResources() {
                    this.elements.resourcesContainer.innerHTML = this.mockData.resources.map(res => `
                            <li><a href="${res.url}" target="_blank" rel="noopener noreferrer"><i class="${res.icon} fa-fw"></i> ${res.text}</a></li>
                        `).join('');
                },

                renderQuickActions() {
                    this.elements.actionsContainer.innerHTML = this.mockData.quickActions.map(act => `
                            <li><a href="${act.url}"><i class="${act.icon} fa-fw"></i> ${act.text}</a></li>
                        `).join('');
                },

                renderFaq(filteredData = this.state.faqData) {
                    if (filteredData.length === 0) {
                        this.elements.faqContainer.innerHTML = `<p style="color: var(--text-secondary); text-align: center; padding: 1rem;">No questions found.</p>`;
                        return;
                    }
                    this.elements.faqContainer.innerHTML = filteredData.map(item => `
                            <div class="faq-item">
                                <div class="faq-question">
                                    <span>${item.q}</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </div>
                                <div class="faq-answer"><p>${item.a}</p></div>
                            </div>
                        `).join('');
                },

                toggleFaqItem(faqItem) {
                    faqItem.classList.toggle('open');
                },

                filterFaq(searchTerm) {
                    const lowerCaseTerm = searchTerm.toLowerCase();
                    const filtered = this.state.faqData.filter(item =>
                        item.q.toLowerCase().includes(lowerCaseTerm) ||
                        item.a.toLowerCase().includes(lowerCaseTerm)
                    );
                    this.renderFaq(filtered);
                }
            };

            // --- Run the Controller ---
            helpController.init();
        });
    </script>
</body>
</html>
