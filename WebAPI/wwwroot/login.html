<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Login - ForexTradingBot</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/img/favicon.png"> <!-- Adjust path if you have one -->
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS (for grid system and utilities) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Toastr CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">

    <!-- Custom CSS for the full UI upgrade -->
    <style>
        /*
        ==========================================================================
        1.  CSS VARIABLES & THEME SETUP
            - Defines color palettes, fonts, and dimensions for Light & Dark modes.
            - Uses CSS variables for easy theme management and consistency.
        ==========================================================================
        */

        :root {
            --font-family-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-weight-light: 300;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-bold: 700;
            /* Light Theme Palette */
            --bg-color: #f0f2f5;
            --panel-bg: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.4);
            --text-primary: #1a1a1a;
            --text-secondary: #5a6474;
            --text-link: #007bff;
            --text-link-hover: #0056b3;
            --input-bg: #ffffff;
            --input-border: #d9d9d9;
            --input-focus-border: #007bff;
            --input-icon-color: #a0a0a0;
            --button-primary-bg: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            --button-primary-hover-bg: linear-gradient(135deg, #0069d9 0%, #004085 100%);
            --button-shadow: 0 4px 15px rgba(0, 123, 255, 0.2);
            --button-hover-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
            --separator-color: #e0e0e0;
            --theme-toggle-bg: #dbe1e8;
            --theme-toggle-slider: #ffffff;
            --theme-toggle-icon: #f39c12; /* Sun icon */
        }

        [data-theme="dark"] {
            /* Dark Theme Palette */
            --bg-color: #121212;
            --panel-bg: rgba(28, 28, 30, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e6e6e6;
            --text-secondary: #a0a7b4;
            --text-link: #4dabf7;
            --text-link-hover: #74c0fc;
            --input-bg: #2a2a2e;
            --input-border: #444449;
            --input-focus-border: #4dabf7;
            --input-icon-color: #888;
            --separator-color: #3a3a3c;
            --theme-toggle-bg: #444;
            --theme-toggle-slider: #222;
            --theme-toggle-icon: #868eff; /* Moon icon */
        }


        /*
        ==========================================================================
        2.  BASE & BODY STYLES
            - Includes the animated background and global font settings.
        ==========================================================================
        */

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--font-family-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden; /* Prevent scrollbars from the animated background */
        }

            /* Animated Background */
            body::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M0 50 L50 0 L100 50 L50 100 Z" fill="rgba(0, 123, 255, 0.04)"/></svg>');
                background-repeat: repeat;
                background-size: 200px 200px;
                animation: moveBackground 60s linear infinite;
                z-index: -1;
                opacity: 0.5;
                transition: opacity 0.4s ease;
            }

        [data-theme="dark"] body::before {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M0 50 L50 0 L100 50 L50 100 Z" fill="rgba(77, 171, 247, 0.05)"/></svg>');
        }

        @keyframes moveBackground {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: -200px -200px;
            }
        }


        /*
        ==========================================================================
        3.  LOGIN PANEL & LAYOUT (Glassmorphism)
        ==========================================================================
        */

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            margin: 20px;
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            border: 1px solid var(--panel-border);
            text-align: center;
            animation: fadeInPanel 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            transition: background-color 0.4s ease, border 0.4s ease;
        }

        @keyframes fadeInPanel {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--text-link);
            margin-bottom: 10px;
            transition: color 0.4s ease;
        }

        .login-container h2 {
            font-weight: var(--font-weight-bold);
            font-size: 1.8rem;
            color: var(--text-primary);
            margin: 0;
            transition: color 0.4s ease;
        }

        .login-container p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 5px;
            transition: color 0.4s ease;
        }


        /*
        ==========================================================================
        4.  FORM ELEMENTS & INPUTS
        ==========================================================================
        */

        .form-group {
            margin-bottom: 25px;
            position: relative;
            text-align: left;
        }

            .form-group .form-control {
                background-color: var(--input-bg);
                border: 1px solid var(--input-border);
                border-radius: 8px;
                height: 52px;
                padding: 0 20px 0 50px; /* Space for icon */
                font-size: 1rem;
                color: var(--text-primary);
                transition: all 0.3s ease;
            }

        .form-control::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .form-control:focus {
            background-color: var(--input-bg);
            color: var(--text-primary);
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        [data-theme="dark"] .form-control:focus {
            box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15);
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            color: var(--input-icon-color);
            transition: color 0.3s ease;
        }

        .form-control:focus ~ .input-icon {
            color: var(--text-link);
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            color: var(--input-icon-color);
            cursor: pointer;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .form-check {
            color: var(--text-secondary);
        }

        .form-check-input:checked {
            background-color: var(--text-link);
            border-color: var(--text-link);
        }

        .form-check-label {
            cursor: pointer;
        }

        .forgot-password-link {
            color: var(--text-link);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: color 0.3s ease;
        }

            .forgot-password-link:hover {
                color: var(--text-link-hover);
                text-decoration: underline;
            }


        /*
        ==========================================================================
        5.  BUTTONS & ACTIONS
        ==========================================================================
        */

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: var(--font-weight-bold);
            border-radius: 8px;
            border: none;
            color: #fff;
            background-image: var(--button-primary-bg);
            box-shadow: var(--button-shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

            .btn-submit:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: var(--button-hover-shadow);
                background-image: var(--button-primary-hover-bg);
            }

            .btn-submit:active:not(:disabled) {
                transform: translateY(0);
                box-shadow: none;
            }

            .btn-submit:disabled {
                cursor: not-allowed;
                opacity: 0.7;
            }

            .btn-submit .btn-text {
                transition: opacity 0.2s ease-in-out;
            }

            .btn-submit .spinner-icon {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 1.5em;
                opacity: 0;
                transition: opacity 0.2s ease-in-out;
            }

            .btn-submit.btn-loading .btn-text {
                opacity: 0;
            }

            .btn-submit.btn-loading .spinner-icon {
                opacity: 1;
            }


        /*
        ==========================================================================
        6.  ERROR MESSAGE & SEPARATORS
        ==========================================================================
        */

        .error-message {
            color: #e74c3c;
            background-color: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            margin: 30px 0;
            font-size: 0.8rem;
            font-weight: var(--font-weight-medium);
        }

            .separator::before,
            .separator::after {
                content: '';
                flex: 1;
                border-bottom: 1px solid var(--separator-color);
                transition: border-color 0.4s ease;
            }

            .separator:not(:empty)::before {
                margin-right: .5em;
            }

            .separator:not(:empty)::after {
                margin-left: .5em;
            }


        /*
        ==========================================================================
        7.  SOCIAL LOGINS & FOOTER
        ==========================================================================
        */

        .social-login-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-social {
            flex-grow: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            font-weight: var(--font-weight-medium);
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid var(--input-border);
            color: var(--text-primary);
        }

            .btn-social:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }

        [data-theme="dark"] .btn-social:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-social .fab {
            font-size: 1.2rem;
        }

        .btn-google {
            color: #DB4437;
        }

        .btn-github {
            color: var(--text-primary);
        }

        .login-footer {
            margin-top: 30px;
        }

        /*
        ==========================================================================
        8.  THEME TOGGLE SWITCH
        ==========================================================================
        */

        .theme-switch-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
        }

        .theme-switch {
            display: inline-block;
            height: 28px;
            position: relative;
            width: 54px;
        }

            .theme-switch input {
                display: none;
            }

        .slider {
            background-color: var(--theme-toggle-bg);
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 28px;
        }

            .slider:before {
                background-color: var(--theme-toggle-slider);
                bottom: 4px;
                content: "";
                height: 20px;
                left: 4px;
                position: absolute;
                transition: .4s;
                width: 20px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Font Awesome 6 Free";
                font-weight: 900;
                font-size: 12px;
                color: var(--theme-toggle-icon);
            }

            .slider.round:before {
                content: '\f185'; /* Sun icon */
            }

        [data-theme="dark"] .slider.round:before {
            content: '\f186'; /* Moon icon */
        }

        input:checked + .slider {
            background-color: var(--theme-toggle-bg);
        }

            input:checked + .slider:before {
                transform: translateX(26px);
            }

        /*
        ==========================================================================
        9.  RESPONSIVE DESIGN
        ==========================================================================
        */
        @media (max-width: 480px) {
            .login-container {
                padding: 25px;
            }

                .login-container h2 {
                    font-size: 1.6rem;
                }

            .social-login-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body data-theme="light">

    <!-- Theme Toggle Switch -->
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="theme-toggle-checkbox">
            <input type="checkbox" id="theme-toggle-checkbox" />
            <div class="slider round"></div>
        </label>
    </div>

    <!-- Login Container -->
    <div class="login-container">

        <div class="login-header">
            <i class="fas fa-chart-line logo-icon"></i>
            <h2>Secure Admin Portal</h2>
            <p>Welcome to ForexTradingBot</p>
        </div>

        <form id="loginForm">
            <!-- Username Input -->
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
                <i class="fas fa-user input-icon"></i>
            </div>

            <!-- Password Input -->
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
                <i class="fas fa-lock input-icon"></i>
                <i class="fas fa-eye password-toggle" id="password-toggle-icon"></i>
            </div>

            <!-- Form Options: Remember Me & Forgot Password -->
            <div class="form-options">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="rememberMeCheck">
                    <label class="form-check-label" for="rememberMeCheck">
                        Remember Me
                    </label>
                </div>
                <a href="#" class="forgot-password-link">Forgot Password?</a>
            </div>

            <!-- Error Message Display -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit">
                <span class="btn-text">Login</span>
                <i class="fas fa-spinner fa-spin spinner-icon"></i>
            </button>
        </form>

        <div class="separator">OR CONTINUE WITH</div>

        <!-- Social Logins -->
        <div class="social-login-container">
            <a href="#" class="btn-social btn-google"><i class="fab fa-google"></i> Google</a>
            <a href="#" class="btn-social btn-github"><i class="fab fa-github"></i> GitHub</a>
        </div>

        <div class="login-footer">
            <p style="font-size: 0.8rem; color: var(--text-secondary);">© 2024 ForexTradingBot. All Rights Reserved.</p>
        </div>

    </div>

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- Toastr JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <!--
    ============================================================================
    UI-ONLY JAVASCRIPT
    - Handles theme switching, password visibility, and button loading state.
    - Does NOT interfere with the form submission logic in js/login.js.
    ============================================================================
    -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- Theme Toggle Logic ---
            const themeToggle = document.getElementById('theme-toggle-checkbox');
            const currentTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', currentTheme);
            themeToggle.checked = currentTheme === 'dark';

            themeToggle.addEventListener('change', function () {
                const theme = this.checked ? 'dark' : 'light';
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            });

            // --- Password Visibility Toggle ---
            const passwordInput = document.getElementById('password');
            const passwordToggleIcon = document.getElementById('password-toggle-icon');

            if (passwordToggleIcon) {
                passwordToggleIcon.addEventListener('click', function () {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    this.classList.toggle('fa-eye', !isPassword);
                    this.classList.toggle('fa-eye-slash', isPassword);
                });
            }

            // --- Form Submission Loading State ---
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function (e) {
                    // This does NOT prevent default submission.
                    // It just adds a loading class to the button for better UX.
                    // The actual form submission will still be handled by js/login.js
                    const submitButton = this.querySelector('.btn-submit');
                    if (submitButton) {
                        submitButton.classList.add('btn-loading');
                        submitButton.disabled = true;

                        // As a fallback, if the page doesn't redirect, re-enable the button
                        // This helps if there's a client-side validation error.
                        setTimeout(() => {
                            if (submitButton.classList.contains('btn-loading')) {
                                submitButton.classList.remove('btn-loading');
                                submitButton.disabled = false;
                            }
                        }, 5000); // 5-second timeout
                    }
                });
            }
        });
    </script>

    <!-- Custom login logic script -->
    <script src="js/login.js"></script>

</body>
</html>
