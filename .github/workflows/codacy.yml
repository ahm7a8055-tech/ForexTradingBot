# .github/workflows/codacy.yml

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Codacy Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]
  schedule:
    - cron: '21 1 * * 6'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Execute Codacy Analysis CLI using the latest stable version
      # This is more stable and includes recent bug fixes.
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4 # ✅ UPDATED from a specific commit to v4
        with:
          # Your project token stored in GitHub secrets
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          # This helps integrate results with GitHub's code scanning UI
          gh-code-scanning-compat: true
          # This ensures the workflow doesn't fail here, letting GitHub handle the results
          max-allowed-issues: 2147483647

      # Step 3: Upload the SARIF file to GitHub's Code Scanning UI
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
