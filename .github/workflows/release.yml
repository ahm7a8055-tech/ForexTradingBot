name: Build and Release

# =========================================================================
# ✅ UPDATED TRIGGER SECTION
# =========================================================================
on:
  # 1. Manual Trigger: Adds a "Run workflow" button on the Actions tab
  workflow_dispatch:

  # 2. Automatic Trigger:
  #    - Runs on every push to 'master' branch.
  #    - Runs when a new version tag (v*.*.*) is pushed.
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
# =========================================================================

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore, Build, and Publish
        run: >
          dotnet publish WebAPI/WebAPI.csproj 
          -c Release 
          -r win-x64 
          --self-contained true 
          -p:PublishSingleFile=true 
          -p:PublishTrimmed=true 
          -o ./publish

      - name: Determine Artifact Name
        id: artifact_name
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "ARTIFACT_NAME=ForexTradingBot-${GITHUB_REF_NAME}-win-x64.zip" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "ARTIFACT_NAME=ForexTradingBot-${SHORT_SHA}-win-x64.zip" >> $GITHUB_ENV
          fi

      - name: Package release artifacts
        run: Compress-Archive -Path ./publish/* -DestinationPath "${{ env.ARTIFACT_NAME }}"
        shell: powershell

      - name: Create GitHub Release (On Tag Push Only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ env.ARTIFACT_NAME }}"
          name: "Release ${{ github.ref_name }}"
          body: "Automatic release of version ${{ github.ref_name }}."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
