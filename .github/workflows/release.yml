# -----------------------------------------------------------------------------
# Workflow Name
# -----------------------------------------------------------------------------
name: Build, Test, and Release

# -----------------------------------------------------------------------------
# Triggers
# -----------------------------------------------------------------------------
on:
  workflow_dispatch:
  push:
    branches:
      - master
  create:
    tags:
      - 'v*.*.*'

# -----------------------------------------------------------------------------
# Jobs
# -----------------------------------------------------------------------------
jobs:
  # ===========================================================================
  # JOB 1: Full Integration Test & Build on Linux
  # ===========================================================================
  build-and-test-full:
    name: Build & Test (Linux, Full Integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env: { POSTGRES_USER: testuser, POSTGRES_PASSWORD: testpassword, POSTGRES_DB: integration_tests }
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Unit & Integration Tests (Full)
        run: dotnet test --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=integration_tests;Username=testuser;Password=testpassword"
          ConnectionStrings__Redis: "localhost:6379"
          TelegramPanel__BotToken: "123456:ABC-DEF1234567890" # Dummy token
          TEST_ENVIRONMENT: "Full"
          ASPNETCORE_ENVIRONMENT: "Development"

      - name: Run Smoke Test
        run: |
          echo "Starting application in the background for smoke test..."
          dotnet run --project WebAPI/WebAPI.csproj &
          echo "Waiting for application to start (polling /healthz)..."
          for i in {1..15}; do
            if curl -s -L --fail http://localhost:5000/healthz; then
              echo "✅ Health check passed!"
              kill $(lsof -t -i:5000) || true
              exit 0
            fi
            echo "Health check failed. Retrying in 2 seconds..."
            sleep 2
          done
          echo "❌ Health check failed after 30 seconds."
          exit 1
        env:
          IsSmokeTest: "true"
          ASPNETCORE_ENVIRONMENT: "Development"
          ConnectionStrings__DefaultConnection: "Data Source=smoke_test.db"
          TelegramPanel__BotToken: "123456:ABC-DEF1234567890" # Dummy token

      - name: Publish application
        run: dotnet publish WebAPI/WebAPI.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Determine Artifact Name
        id: artifact_name
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ARTIFACT_FILENAME="ForexTradingBot-${{ github.ref_name }}-linux-x64.tar.gz"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            ARTIFACT_FILENAME="ForexTradingBot-${SHORT_SHA}-linux-x64.tar.gz"
          fi
          echo "ARTIFACT_FILENAME=${ARTIFACT_FILENAME}" >> $GITHUB_ENV

      - name: Package Artifact
        run: tar -czvf "${{ env.ARTIFACT_FILENAME }}" -C ./publish .
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-linux-x64
          path: ${{ env.ARTIFACT_FILENAME }}

  # ===========================================================================
  # JOB 2: Lightweight Build & Test on Windows and macOS
  # ===========================================================================
  build-and-test-lightweight:
    name: Build & Test (${{ matrix.os }}, Lightweight)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_ext: .zip
          - os: macos-latest
            rid: osx-x64
            artifact_ext: .tar.gz
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Unit & Integration Tests (Lightweight)
        run: dotnet test --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Data Source=lightweight_test.db"
          TelegramPanel__BotToken: "123456:ABC-DEF1234567890" # Dummy token
          TEST_ENVIRONMENT: "Lightweight" # This now controls the Redis registration
          ASPNETCORE_ENVIRONMENT: "Development"

      - name: Run Smoke Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "Starting application in the background for smoke test..."
          Start-Process dotnet -ArgumentList 'run', '--project', 'WebAPI/WebAPI.csproj' -NoNewWindow
          echo "Waiting for application to start (polling /healthz)..."
          foreach ($i in 1..15) {
            $response = try { Invoke-WebRequest -Uri http://localhost:5000/healthz -UseBasicParsing } catch { $null }
            if ($response.StatusCode -eq 200) {
              echo "✅ Health check passed!"
              Get-Process -Name "dotnet" | Stop-Process -Force
              exit 0
            }
            echo "Health check failed. Retrying in 2 seconds..."
            Start-Sleep -Seconds 2
          }
          echo "❌ Health check failed after 30 seconds."
          exit 1
        env:
          IsSmokeTest: "true"
          ASPNETCORE_ENVIRONMENT: "Development"
          ConnectionStrings__DefaultConnection: "Data Source=smoke_test.db"
          TelegramPanel__BotToken: "123456:ABC-DEF1234567890" # Dummy token

      - name: Run Smoke Test (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Starting application in the background for smoke test..."
          dotnet run --project WebAPI/WebAPI.csproj &
          echo "Waiting for application to start (polling /healthz)..."
          for i in {1..15}; do
            if curl -s -L --fail http://localhost:5000/healthz; then
              echo "✅ Health check passed!"
              kill $(lsof -t -i:5000) || true
              exit 0
            fi
            echo "Health check failed. Retrying in 2 seconds..."
            sleep 2
          done
          echo "❌ Health check failed after 30 seconds."
          exit 1
        env:
          IsSmokeTest: "true"
          ASPNETCORE_ENVIRONMENT: "Development"
          ConnectionStrings__DefaultConnection: "Data Source=smoke_test.db"
          TelegramPanel__BotToken: "123456:ABC-DEF1234567890" # Dummy token

      - name: Publish application
        run: dotnet publish WebAPI/WebAPI.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Determine Artifact Name
        id: artifact_name
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ARTIFACT_FILENAME="ForexTradingBot-${{ github.ref_name }}-${{ matrix.rid }}${{ matrix.artifact_ext }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            ARTIFACT_FILENAME="ForexTradingBot-${SHORT_SHA}-${{ matrix.rid }}${{ matrix.artifact_ext }}"
          fi
          echo "ARTIFACT_FILENAME=${ARTIFACT_FILENAME}" >> $GITHUB_ENV

      - name: Package Artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ./publish/* -DestinationPath "${{ env.ARTIFACT_FILENAME }}"
        
      - name: Package Artifact (macOS)
        if: runner.os == 'macOS'
        run: tar -czvf "${{ env.ARTIFACT_FILENAME }}" -C ./publish .
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.rid }}
          path: ${{ env.ARTIFACT_FILENAME }}

  # ===========================================================================
  # JOB 3: Create Release (Depends on all build jobs)
  # ===========================================================================
  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-and-test-full, build-and-test-lightweight]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/**/*
          name: "Release ${{ github.ref_name }}"
          body: "Automatic release of version ${{ github.ref_name }}."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
