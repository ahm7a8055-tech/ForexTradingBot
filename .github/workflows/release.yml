{
  "name": "Build and Release",
  "on": {
    "push": {
      "tags": [
        "v*.*.*"
      ]
    }
  },
  "jobs": {
    "build-and-release": {
      "runs-on": "windows-latest",
      "steps": [
        {
          "name": "Checkout repository",
          "uses": "actions/checkout@v4"
        },
        {
          "name": "Setup .NET SDK",
          "uses": "actions/setup-dotnet@v4",
          "with": {
            "global-json-file": "global.json"
          }
        },
        {
          "name": "Restore, Build, and Publish",
          "run": "dotnet publish WebAPI/WebAPI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o ./publish"
        },
        {
          "name": "Package release artifacts",
          "run": "Compress-Archive -Path ./publish/* -DestinationPath \"ForexTradingBot-${{ github.ref_name }}-win-x64.zip\"",
          "shell": "powershell"
        },
        {
          "name": "Create GitHub Release",
          "uses": "softprops/action-gh-release@v2",
          "with": {
            "files": "ForexTradingBot-${{ github.ref_name }}-win-x64.zip",
            "name": "Release ${{ github.ref_name }}",
            "body": "Automatic release of version ${{ github.ref_name }}.",
            "draft": false,
            "prerelease": false
          },
          "env": {
            "GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}"
          }
        }
      ]
    }
  }
}
