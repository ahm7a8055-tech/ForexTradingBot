name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  # =========================================================================
  # JOB 1: Build for multiple platforms in parallel
  # =========================================================================
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_ext: .zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact_ext: .tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact_ext: .tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore, Build, and Publish
        run: >
          dotnet publish WebAPI/WebAPI.csproj 
          -c Release 
          -r ${{ matrix.rid }} 
          --self-contained true 
          -p:PublishSingleFile=true 
          -p:PublishTrimmed=true 
          -o ./publish

      - name: Determine Artifact Name
        id: artifact_name
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "ARTIFACT_FILENAME=ForexTradingBot-${GITHUB_REF_NAME}-${{ matrix.rid }}${{ matrix.artifact_ext }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "ARTIFACT_FILENAME=ForexTradingBot-${SHORT_SHA}-${{ matrix.rid }}${{ matrix.artifact_ext }}" >> $GITHUB_ENV
          fi
          
      - name: Package for Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ./publish/* -DestinationPath "${{ env.ARTIFACT_FILENAME }}"
        shell: powershell

      - name: Package for Linux/macOS
        if: runner.os != 'Windows'
        run: tar -czvf "${{ env.ARTIFACT_FILENAME }}" -C ./publish .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: "${{ env.ARTIFACT_FILENAME }}"

  # =========================================================================
  # JOB 2: Create a single release after all builds are done
  # =========================================================================
  create-release:
    # This job only runs when a tag is pushed
    if: startsWith(github.ref, 'refs/tags/')
    # It needs to wait for all the matrix build jobs to complete successfully
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permission to create the release

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use a wildcard to upload all files from the downloaded artifacts
          files: ./release-assets/*
          name: "Release ${{ github.ref_name }}"
          body: "Automatic release of version ${{ github.ref_name }}."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
